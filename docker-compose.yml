services:
  app:
    build: .
    container_name: servidor-ema
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - db
    env_file:
      - .env

  migrate:
    build: .
    command: yarn migrate
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
  
  db:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgis-init.sql:/docker-entrypoint-initdb.d/postgis-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5    

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
