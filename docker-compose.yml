services:
  app:
    build: .
    container_name: servidor-ema
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: yarn dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  migrate:
    build: .
    command: sh -c "until pg_isready -h db -p 5432 -U ${DB_USER}; do sleep 2; done && yarn migrate && yarn seed"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  worker:
    build: .
    container_name: servidor-ema-worker
    command: yarn queue
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - redis
      - db
    environment:
      - NODE_ENV=development
    env_file:
      - .env

  db:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgis-init.sql:/docker-entrypoint-initdb.d/postgis-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
  node_modules:
